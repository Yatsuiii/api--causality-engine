name: branching API flow
initial_state: login

variables:
  base_url: https://jsonplaceholder.typicode.com

steps:
  - name: login
    state: login
    method: POST
    url: "{{base_url}}/posts"
    body:
      title: "login attempt"
      userId: 1
    assert:
      - status: 201
    extract:
      post_id: "id"

  - name: fetch_profile
    state: fetch_profile
    method: GET
    url: "{{base_url}}/users/1"
    assert:
      - status: 200
      - body:
          username:
            exists: true

  - name: login_failed
    state: login_failed
    method: GET
    url: "{{base_url}}/posts/1"
edges:
  - from: login
    to: fetch_profile
    when:
      assertions: passed
  - from: login
    to: login_failed
    default: true
  - from: fetch_profile
    to: done
    when:
      status: 200
  - from: fetch_profile
    to: login_failed
    default: true
  - from: login_failed
    to: error
    default: true
