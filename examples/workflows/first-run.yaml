name: simple flow
initial_state: start
steps:
  - name: list users
    state: start
    method: GET
    url: https://jsonplaceholder.typicode.com/users
    assert:
      - status: 200
      - response_time_ms:
          lt: 5000

  - name: get first user
    state: fetched
    method: GET
    url: https://jsonplaceholder.typicode.com/users/1
    assert:
      - status: 200
      - body:
          name:
            exists: true
edges:
  - from: start
    to: fetched
    default: true
  - from: fetched
    to: done
    default: true
