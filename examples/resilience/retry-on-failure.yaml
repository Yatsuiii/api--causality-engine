name: retry test
initial_state: start
steps:
  - name: login
    state: start
    method: POST
    url: https://jsonplaceholder.typicode.com/posts
    headers:
      Content-Type: application/json
    body:
      title: "Auth Request"
      userId: 1
    retry:
      attempts: 3
      delay_ms: 500
    assert:
      - status: 201
    extract:
      token: "id"
edges:
  - from: start
    to: logged_in
    default: true
