name: poll until ready
initial_state: check_status
max_iterations: 10

variables:
  base_url: https://jsonplaceholder.typicode.com

steps:
  - name: check status
    state: check_status
    method: GET
    url: "{{base_url}}/posts/1"
    assert:
      - status: 200
      - body:
          userId:
            eq: 1
    transitions:
      - to: done
        when:
          assertions: passed
      - to: wait_and_retry
        default: true

  - name: wait and retry
    state: wait_and_retry
    method: GET
    url: "{{base_url}}/posts/1"
    pre_request:
      - delay_ms: 500
      - log: "Waiting before retry..."
    transitions:
      - to: check_status
        default: true
