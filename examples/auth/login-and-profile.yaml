name: login and fetch profile
initial_state: login
concurrency: 3

variables:
  base_url: https://jsonplaceholder.typicode.com

steps:
  - name: login
    state: login
    method: POST
    url: "{{base_url}}/posts"
    headers:
      Content-Type: application/json
    body:
      title: "Login Request"
      body: "credentials"
      userId: 1
    assert:
      - status: 201
    extract:
      session_token: "id"

  - name: fetch profile
    state: fetch_profile
    method: GET
    url: "{{base_url}}/users/1"
    headers:
      X-Session-Token: "{{session_token}}"
    assert:
      - status: 200
      - body:
          username:
            exists: true
          email:
            contains: "@"
      - response_time_ms:
          lt: 5000
    extract:
      username: "username"
      email: "email"
edges:
  - from: login
    to: fetch_profile
    default: true
  - from: fetch_profile
    to: done
    default: true
