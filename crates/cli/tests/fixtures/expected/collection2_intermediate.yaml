name: "ACE Import Test — Intermediate"
initial_state: start
variables:
  base_url: "https://jsonplaceholder.typicode.com"
steps:
  # --- Folder: Auth ---
  - name: Login
    state: start
    method: POST
    url: "{{base_url}}/posts"
    tags: [Auth]
    headers:
      Content-Type: "application/json"
    body:
      email: '{{email}}'
      password: '{{password}}'
      title: Login Request
      userId: 1
    assert:
      - status: 201
      - body:
          id:
            exists: true
    extract:
      _token_raw: id
      user_id: id
    post_request:
      - set:
          token: "Bearer simulated-token-{{_token_raw}}"
    pre_request:
      - set:
          email: "test@example.com"
          password: "hunter2"
  # --- Folder: User ---
  - name: Get User Profile
    state: login
    method: GET
    url: "{{base_url}}/posts/{{user_id}}"
    tags: [User]
    headers:
      Authorization: "{{token}}"
      Accept: "application/json"
    assert:
      - status: 200
      - body:
          userId:
            exists: true
      - response_time_ms:
          lt: 500
  - name: Update User Profile
    state: get_user_profile
    method: PUT
    url: "{{base_url}}/posts/{{user_id}}"
    tags: [User]
    headers:
      Authorization: "{{token}}"
      Content-Type: "application/json"
    # NOTE: one or more body fields had {{var}} in a non-string JSON position
    #       and were coerced to strings to preserve the template.
    #       Adjust types manually if the API requires a number.
    body:
      body: Updated bio
      id: '{{user_id}}'
      title: Updated Profile
      userId: 1
    assert:
      - status: 200
      - body:
          title:
            eq: "Updated Profile"
  # --- Folder: Posts ---
  - name: Get All Posts
    state: update_user_profile
    method: GET
    url: "{{base_url}}/posts?userId={{user_id}}"
    tags: [Posts]
    headers:
      Authorization: "{{token}}"
    assert:
      - status: 200
      - body_type: array
    extract:
      first_post_id: "[0].id"
  - name: Get Post Comments
    state: get_all_posts
    method: GET
    url: "{{base_url}}/posts/{{first_post_id}}/comments"
    tags: [Posts]
    headers:
      Authorization: "{{token}}"
    assert:
      - status: 200
      - body_type: array
edges:
  - from: start
    to: login
    default: true
  - from: login
    to: get_user_profile
    default: true
  - from: get_user_profile
    to: update_user_profile
    default: true
  - from: update_user_profile
    to: get_all_posts
    default: true
  - from: get_all_posts
    to: done
    default: true
