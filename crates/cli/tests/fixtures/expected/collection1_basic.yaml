name: "ACE Import Test — Basic"
initial_state: start
variables:
  base_url: "https://jsonplaceholder.typicode.com"
steps:
  - name: Get Post
    state: start
    method: GET
    url: "{{base_url}}/posts/1"
    headers:
      Accept: "application/json"
    assert:
      - status: 200
  - name: Get Posts with Query Param
    state: get_post
    method: GET
    url: "{{base_url}}/posts?userId=1"
    headers:
      Accept: "application/json"
    assert:
      - status: 200
  - name: Create Post
    state: get_posts_with_query_param
    method: POST
    url: "{{base_url}}/posts"
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
    body:
      body: This is a test post body
      title: Test Post
      userId: 1
    assert:
      - status: 201
  - name: Update Post
    state: create_post
    method: PUT
    url: "{{base_url}}/posts/1"
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
    body:
      body: Updated body content
      id: 1
      title: Updated Title
      userId: 1
    assert:
      - status: 200
  - name: Delete Post
    state: update_post
    method: DELETE
    url: "{{base_url}}/posts/1"
    headers:
      Accept: "application/json"
    assert:
      - status: 200
edges:
  - from: start
    to: get_post
    default: true
  - from: get_post
    to: get_posts_with_query_param
    default: true
  - from: get_posts_with_query_param
    to: create_post
    default: true
  - from: create_post
    to: update_post
    default: true
  - from: update_post
    to: done
    default: true
